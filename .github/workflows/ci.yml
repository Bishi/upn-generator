name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-windows:
    name: Warm Windows build cache
    runs-on: windows-latest
    concurrency:
      group: ci-windows-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
          shared-key: windows-tauri
          cache-on-failure: true

      - name: Configure Rust compiler cache
        shell: bash
        run: |
          echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
          echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
          echo "CARGO_INCREMENTAL=0" >> "$GITHUB_ENV"

      - name: Build frontend
        run: npm run build

      - name: Warm Rust release build
        run: cargo build --manifest-path src-tauri/Cargo.toml --release

      - name: Show sccache stats
        if: always()
        shell: bash
        run: sccache --show-stats
