name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
          cache-on-failure: true

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        with:
          includeUpdaterJson: false

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "UPN Generator ${{ github.ref_name }}"
          body: |
            ## UPN Generator ${{ github.ref_name }}

            Windows installer for the UPN Generator app.

            ### Installation
            Download `UPN Generator_*_x64_en-US.msi` and run it to install.

            ### What's included
            - Automatic PDF bill parsing
            - Bill splitting by apartment occupancy
            - UPN payment slip generation (PDF)
            - Email delivery to tenants
          files: |
            src-tauri/target/release/bundle/**/*.msi
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
